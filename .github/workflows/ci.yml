          cat > "ALICE-DB/Cargo.toml" << TOML
          [package]
          name = "alice-db"
          version = "0.1.0"
          edition = "2021"
          [features]
          default = []
          std = []
          [dependencies]
          TOML
          cat > "ALICE-DB/src/lib.rs" << 'RUST'
          use std::path::Path;
          use std::io;
          #[allow(dead_code)]
          pub enum Aggregation { None, Sum, Avg, Min, Max, Count, First, Last, StdDev, Variance }
          pub struct AliceDB;
          impl AliceDB {
              pub fn open<P: AsRef<Path>>(_p: P) -> io::Result<Self> { Ok(Self) }
              pub fn put(&self, _ts: i64, _v: f32) -> io::Result<()> { Ok(()) }
              pub fn put_batch(&self, _d: &[(i64, f32)]) -> io::Result<()> { Ok(()) }
              pub fn aggregate(&self, _s: i64, _e: i64, _a: Aggregation) -> io::Result<f64> { Ok(0.0) }
          }
          RUST
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --manifest-path ALICE-Risk/Cargo.toml --tests -- -W clippy::all -W clippy::pedantic -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

