              pub fn put_batch(&self, _d: &[(i64, f32)]) -> io::Result<()> { Ok(()) }
              pub fn aggregate(&self, _s: i64, _e: i64, _a: Aggregation) -> io::Result<f64> { Ok(0.0) }
