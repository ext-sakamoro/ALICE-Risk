name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ALICE-Risk
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Ledger
          path: ALICE-Ledger
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path ALICE-Risk/Cargo.toml

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ALICE-Risk
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Ledger
          path: ALICE-Ledger
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --manifest-path ALICE-Risk/Cargo.toml --tests -- -W clippy::all -W clippy::pedantic -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ALICE-Risk
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Ledger
          path: ALICE-Ledger
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --manifest-path ALICE-Risk/Cargo.toml --no-deps 2>&1 | (! grep warning)
