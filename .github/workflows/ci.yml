name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ALICE-Risk
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Ledger
          path: ALICE-Ledger
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Sync
          path: ALICE-Sync
      - name: Create dependency stubs
        run: |
          for crate_info in \
            "ALICE-DB:alice-db" \
            "ALICE-Physics:alice-physics" \
            "ALICE-Cache:alice-cache" \
            "ALICE-Auth:alice-auth" \
            "ALICE-Codec:alice-codec" \
            "ALICE-Analytics:alice-analytics" \
            "ALICE-Crypto:alice-crypto" \
            "ALICE-Zip/libalice:alice-zip"; do
            dir=$(echo "$crate_info" | cut -d: -f1)
            pkg=$(echo "$crate_info" | cut -d: -f2)
            mkdir -p "$dir/src"
            cat > "$dir/Cargo.toml" << TOML
          [package]
          name = "$pkg"
          version = "0.1.0"
          edition = "2021"
          [features]
          default = []
          std = []
          TOML
            echo "" > "$dir/src/lib.rs"
          done
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path ALICE-Risk/Cargo.toml

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ALICE-Risk
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Ledger
          path: ALICE-Ledger
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Sync
          path: ALICE-Sync
      - name: Create dependency stubs
        run: |
          for crate_info in \
            "ALICE-DB:alice-db" \
            "ALICE-Physics:alice-physics" \
            "ALICE-Cache:alice-cache" \
            "ALICE-Auth:alice-auth" \
            "ALICE-Codec:alice-codec" \
            "ALICE-Analytics:alice-analytics" \
            "ALICE-Crypto:alice-crypto" \
            "ALICE-Zip/libalice:alice-zip"; do
            dir=$(echo "$crate_info" | cut -d: -f1)
            pkg=$(echo "$crate_info" | cut -d: -f2)
            mkdir -p "$dir/src"
            cat > "$dir/Cargo.toml" << TOML
          [package]
          name = "$pkg"
          version = "0.1.0"
          edition = "2021"
          [features]
          default = []
          std = []
          TOML
            echo "" > "$dir/src/lib.rs"
          done
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --manifest-path ALICE-Risk/Cargo.toml --tests -- -W clippy::all -W clippy::pedantic -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ALICE-Risk
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Ledger
          path: ALICE-Ledger
      - uses: actions/checkout@v4
        with:
          repository: ext-sakamoro/ALICE-Sync
          path: ALICE-Sync
      - name: Create dependency stubs
        run: |
          for crate_info in \
            "ALICE-DB:alice-db" \
            "ALICE-Physics:alice-physics" \
            "ALICE-Cache:alice-cache" \
            "ALICE-Auth:alice-auth" \
            "ALICE-Codec:alice-codec" \
            "ALICE-Analytics:alice-analytics" \
            "ALICE-Crypto:alice-crypto" \
            "ALICE-Zip/libalice:alice-zip"; do
            dir=$(echo "$crate_info" | cut -d: -f1)
            pkg=$(echo "$crate_info" | cut -d: -f2)
            mkdir -p "$dir/src"
            cat > "$dir/Cargo.toml" << TOML
          [package]
          name = "$pkg"
          version = "0.1.0"
          edition = "2021"
          [features]
          default = []
          std = []
          TOML
            echo "" > "$dir/src/lib.rs"
          done
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --manifest-path ALICE-Risk/Cargo.toml --no-deps 2>&1 | (! grep warning)
